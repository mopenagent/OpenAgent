{% extends "base.html" %}
{% block title %}Chat — OpenAgent{% endblock %}
{% block page_title %}Chat{% endblock %}

{% block content %}
<div class="h-full flex flex-col max-w-3xl mx-auto"
     x-data="chatApp()" x-init="connect()">

  <!-- Message thread -->
  <div class="flex-1 overflow-y-auto space-y-2 mb-4 min-h-0" x-ref="thread">

    <!-- Empty state -->
    <template x-if="messages.length === 0">
      <div class="flex justify-center pt-8">
        <span class="text-xs text-mutedCharcoal dark:text-steelMist">Start a conversation below</span>
      </div>
    </template>

    <!-- Messages -->
    <template x-for="(msg, i) in messages" :key="i">
      <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
        <div :class="msg.role === 'user'
                  ? 'bg-[#FF9933]/20 border border-[#FF9933]/30 text-stone-950 dark:text-slate-100 rounded-2xl rounded-tr-sm'
                  : 'bg-pastelFog dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] text-stone-800 dark:text-steelMist rounded-2xl rounded-tl-sm'"
             class="max-w-lg px-3 py-1.5 text-sm whitespace-pre-wrap">
          <p x-text="msg.content"></p>
        </div>
      </div>
    </template>

    <!-- Typing indicator -->
    <div x-show="typing" class="flex justify-start">
      <div class="bg-pastelFog dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] rounded-2xl rounded-tl-sm px-3 py-1.5">
        <span class="inline-flex gap-1">
          <span class="w-1.5 h-1.5 bg-mutedCharcoal dark:bg-steelMist rounded-full animate-bounce [animation-delay:0ms]"></span>
          <span class="w-1.5 h-1.5 bg-mutedCharcoal dark:bg-steelMist rounded-full animate-bounce [animation-delay:150ms]"></span>
          <span class="w-1.5 h-1.5 bg-mutedCharcoal dark:bg-steelMist rounded-full animate-bounce [animation-delay:300ms]"></span>
        </span>
      </div>
    </div>

  </div>

  <!-- Input bar -->
  <form @submit.prevent="send()" class="flex gap-2 flex-shrink-0">
    <input
      x-model="draft"
      :disabled="!connected"
      type="text"
      placeholder="Message the agent…"
      class="flex-1 bg-softPorcelain dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] rounded-xl px-4 py-2.5 text-sm
             text-stone-950 dark:text-stone-100 placeholder-mutedCharcoal dark:placeholder-steelMist focus:outline-none focus:border-[#FF9933]
             disabled:opacity-40"
    />
    <button type="submit"
            :disabled="!connected || !draft.trim() || typing"
            class="bg-[#FF9933] hover:bg-amber-400 disabled:opacity-40 text-stone-950 font-semibold
                   px-4 py-2.5 rounded-xl text-sm transition-colors">
      Send
    </button>
  </form>

  <!-- Connection status -->
  <p class="mt-2 text-xs text-center"
     :class="connected ? 'text-mutedCharcoal dark:text-steelMist' : 'text-red-400'"
     x-text="connected ? 'Connected · session ' + sessionId : 'Disconnected — reconnecting…'">
  </p>

</div>

<script>
function chatApp() {
  return {
    messages: [],
    draft: "",
    typing: false,
    connected: false,
    sessionId: "",
    ws: null,

    connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      this.ws = new WebSocket(`${proto}://${location.host}/ws/chat`);

      this.ws.onopen = () => { this.connected = true; };
      this.ws.onclose = () => {
        this.connected = false;
        this.typing = false;
        setTimeout(() => this.connect(), 3000);
      };
      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        // First message from server carries the session ID
        if (msg.session_id) {
          this.sessionId = msg.session_id;
          return;
        }
        this.typing = false;
        this.messages.push(msg);
        this.$nextTick(() => this.scrollToBottom());
      };
    },

    send() {
      if (!this.draft.trim() || !this.connected || this.typing) return;
      const text = this.draft.trim();
      this.messages.push({ role: "user", content: text });
      this.ws.send(text);
      this.draft = "";
      this.typing = true;
      this.$nextTick(() => this.scrollToBottom());
    },

    scrollToBottom() {
      const el = this.$refs.thread;
      el.scrollTop = el.scrollHeight;
    }
  }
}
</script>
{% endblock %}
