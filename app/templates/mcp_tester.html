{% extends "base.html" %}
{% block title %}MCP Tester — OpenAgent{% endblock %}
{% block page_title %}MCP-lite Tester{% endblock %}

{% block content %}
<div x-data="mcpTester()" x-init="init()" class="flex gap-3 h-full" style="height: calc(100vh - 8rem);">

  <!-- ── Col 1: Services ─────────────────────────────────────── -->
  <div class="w-48 flex-shrink-0 flex flex-col gap-2 overflow-y-auto">
    <span class="text-xs font-semibold text-mutedCharcoal dark:text-steelMist uppercase tracking-wide">Services</span>

    <template x-if="loading_services">
      <div class="text-xs text-mutedCharcoal dark:text-steelMist py-2">Loading…</div>
    </template>
    <template x-if="!loading_services && services.length === 0">
      <div class="text-xs text-red-400 py-2">No services found — check <code>services/*/service.json</code> mounts.</div>
    </template>

    <div class="space-y-1">
      <template x-for="svc in services" :key="svc.name">
        <button
          @click="selectService(svc)"
          :class="selected_service && selected_service.name === svc.name
            ? 'bg-saffron/10 border-saffron/40 text-saffron'
            : 'border-[#DEE2E6] dark:border-[#21262D] text-stone-700 dark:text-stone-300 hover:bg-[#DEE2E6] dark:hover:bg-[#21262D]'"
          class="w-full text-left px-3 py-2 rounded-lg border text-sm transition-colors"
        >
          <div class="flex items-center justify-between gap-1">
            <span class="font-medium truncate text-xs" x-text="svc.name"></span>
            <span
              class="w-2 h-2 rounded-full flex-shrink-0"
              :class="svc.socket_exists ? 'bg-sage' : 'bg-red-400'"
              :title="svc.socket_exists ? 'Socket present' : 'Socket missing'"
            ></span>
          </div>
          <div class="text-xs text-mutedCharcoal dark:text-steelMist truncate mt-0.5" x-text="'v' + svc.version + ' · :' + svc.port"></div>
        </button>
      </template>
    </div>
  </div>

  <!-- ── Col 2: Tools ────────────────────────────────────────── -->
  <div class="w-48 flex-shrink-0 flex flex-col gap-2 overflow-y-auto">
    <span class="text-xs font-semibold text-mutedCharcoal dark:text-steelMist uppercase tracking-wide">Tools</span>

    <template x-if="!selected_service">
      <div class="text-xs text-mutedCharcoal dark:text-steelMist py-2 italic">Select a service.</div>
    </template>

    <template x-if="selected_service">
      <div class="space-y-1">

        <!-- ping -->
        <button
          @click="selectTool('__ping__')"
          :class="selected_tool === '__ping__'
            ? 'bg-saffron/10 border-saffron/40 text-saffron'
            : 'border-[#DEE2E6] dark:border-[#21262D] text-stone-700 dark:text-stone-300 hover:bg-[#DEE2E6] dark:hover:bg-[#21262D]'"
          class="w-full text-left px-3 py-2 rounded-lg border transition-colors"
        >
          <div class="font-mono font-medium text-xs">ping</div>
          <div class="text-xs text-mutedCharcoal dark:text-steelMist mt-0.5">Health check</div>
        </button>

        <!-- tools.list -->
        <button
          @click="selectTool('__tools_list__')"
          :class="selected_tool === '__tools_list__'
            ? 'bg-saffron/10 border-saffron/40 text-saffron'
            : 'border-[#DEE2E6] dark:border-[#21262D] text-stone-700 dark:text-stone-300 hover:bg-[#DEE2E6] dark:hover:bg-[#21262D]'"
          class="w-full text-left px-3 py-2 rounded-lg border transition-colors"
        >
          <div class="font-mono font-medium text-xs">tools.list</div>
          <div class="text-xs text-mutedCharcoal dark:text-steelMist mt-0.5">List tools</div>
        </button>

        <!-- service tools -->
        <template x-for="tool in selected_service.tools" :key="tool.name">
          <button
            @click="selectTool(tool.name)"
            :class="selected_tool === tool.name
              ? 'bg-saffron/10 border-saffron/40 text-saffron'
              : 'border-[#DEE2E6] dark:border-[#21262D] text-stone-700 dark:text-stone-300 hover:bg-[#DEE2E6] dark:hover:bg-[#21262D]'"
            class="w-full text-left px-3 py-2 rounded-lg border transition-colors"
          >
            <div class="font-mono font-medium text-xs truncate" x-text="tool.name"></div>
            <div class="text-xs text-mutedCharcoal dark:text-steelMist line-clamp-2 mt-0.5" x-text="tool.description"></div>
          </button>
        </template>

      </div>
    </template>
  </div>

  <!-- ── Col 3: Params + Send ────────────────────────────────── -->
  <div class="flex-1 flex flex-col gap-3 min-w-0 overflow-y-auto">

    <template x-if="!selected_service || !selected_tool">
      <div class="flex-1 flex items-center justify-center text-mutedCharcoal dark:text-steelMist text-sm">
        <span x-text="!selected_service ? 'Select a service.' : 'Select a tool.'"></span>
      </div>
    </template>

    <template x-if="selected_service && selected_tool">
      <div class="flex flex-col gap-3">

        <!-- Tool header + Send -->
        <div class="bg-white dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] rounded-xl p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <code class="text-saffron font-mono text-sm font-bold" x-text="selected_tool"></code>
                <span class="text-xs text-mutedCharcoal dark:text-steelMist" x-text="'→ ' + selected_service.name"></span>
              </div>
              <p class="text-xs text-mutedCharcoal dark:text-steelMist mt-1 leading-relaxed" x-text="tool_description()"></p>
            </div>
            <button
              @click="sendFrame()"
              :disabled="loading"
              class="flex-shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg bg-saffron/90 hover:bg-saffron text-white text-sm font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <svg x-show="!loading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span x-text="loading ? 'Sending…' : 'Send'"></span>
            </button>
          </div>
          <div class="mt-3 flex items-center gap-2 text-xs text-mutedCharcoal dark:text-steelMist">
            <span>Timeout:</span>
            <select x-model="timeout_s" class="bg-transparent border border-[#DEE2E6] dark:border-[#21262D] rounded px-1.5 py-0.5 text-xs">
              <option value="5">5s</option>
              <option value="15">15s</option>
              <option value="30">30s</option>
              <option value="60">60s</option>
              <option value="120">120s</option>
            </select>
          </div>
        </div>

        <!-- Params -->
        <div class="bg-white dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] rounded-xl p-4 flex flex-col gap-4">

          <template x-if="selected_tool === '__ping__' || selected_tool === '__tools_list__'">
            <p class="text-xs text-mutedCharcoal dark:text-steelMist italic">No parameters.</p>
          </template>

          <template x-if="selected_tool !== '__ping__' && selected_tool !== '__tools_list__'">
            <div class="space-y-4">

              <template x-for="field in param_fields" :key="field.name">
                <div>
                  <label class="flex items-center gap-1.5 text-xs font-semibold mb-1.5">
                    <span class="font-mono text-saffron" x-text="field.name"></span>
                    <span x-show="field.required" class="text-red-400">*</span>
                    <span class="font-normal text-mutedCharcoal dark:text-steelMist font-sans"
                          x-text="'(' + field.type + (field.enum ? ': ' + field.enum.join(' | ') : '') + ')'"></span>
                  </label>
                  <p class="text-xs text-mutedCharcoal dark:text-steelMist mb-1.5" x-text="field.description"></p>

                  <template x-if="field.enum">
                    <select x-model="params[field.name]"
                      class="w-full bg-[#FAF9F5] dark:bg-deepSpaceBlue border border-[#DEE2E6] dark:border-[#21262D] rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-saffron/50">
                      <template x-for="opt in field.enum" :key="opt">
                        <option :value="opt" x-text="opt"></option>
                      </template>
                    </select>
                  </template>

                  <template x-if="!field.enum && field.type === 'integer'">
                    <input type="number" x-model.number="params[field.name]" :placeholder="field.name"
                      class="w-full bg-[#FAF9F5] dark:bg-deepSpaceBlue border border-[#DEE2E6] dark:border-[#21262D] rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-saffron/50"/>
                  </template>

                  <template x-if="!field.enum && field.type === 'string' && (field.name === 'code' || field.name === 'command')">
                    <textarea x-model="params[field.name]" rows="8" :placeholder="field.name" spellcheck="false"
                      class="w-full bg-[#FAF9F5] dark:bg-deepSpaceBlue border border-[#DEE2E6] dark:border-[#21262D] rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-saffron/50 resize-y"></textarea>
                  </template>

                  <template x-if="!field.enum && field.type === 'string' && field.name !== 'code' && field.name !== 'command'">
                    <input type="text" x-model="params[field.name]" :placeholder="field.name"
                      class="w-full bg-[#FAF9F5] dark:bg-deepSpaceBlue border border-[#DEE2E6] dark:border-[#21262D] rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-saffron/50"/>
                  </template>
                </div>
              </template>

              <!-- Raw JSON override -->
              <div>
                <label class="flex items-center gap-2 text-xs font-semibold mb-1.5">
                  <span class="text-mutedCharcoal dark:text-steelMist">Raw JSON override</span>
                  <button @click="syncRawFromForm()" class="text-saffron hover:underline font-normal">sync from form ↑</button>
                </label>
                <textarea x-model="raw_params" rows="3" spellcheck="false" placeholder='{"key": "value"}'
                  class="w-full bg-[#FAF9F5] dark:bg-deepSpaceBlue border border-[#DEE2E6] dark:border-[#21262D] rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:border-saffron/50 resize-y"></textarea>
                <p class="text-xs text-mutedCharcoal dark:text-steelMist mt-1">Overrides form fields above if non-empty.</p>
              </div>

            </div>
          </template>
        </div>

      </div>
    </template>
  </div>

  <!-- ── Col 4: Frame Log ────────────────────────────────────── -->
  <div class="w-[400px] flex-shrink-0 flex flex-col gap-2 overflow-y-auto">

    <div class="flex items-center justify-between flex-shrink-0">
      <span class="text-xs font-semibold text-mutedCharcoal dark:text-steelMist uppercase tracking-wide">Frame Log</span>
      <button @click="history = []" x-show="history.length > 0"
        class="text-xs px-2 py-0.5 rounded border border-red-300 dark:border-red-800 text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">Clear</button>
    </div>

    <template x-if="history.length === 0">
      <div class="text-xs text-mutedCharcoal dark:text-steelMist italic py-2">No frames yet.</div>
    </template>

    <div class="space-y-3">
      <template x-for="(entry, idx) in history" :key="idx">
        <div class="bg-white dark:bg-charcoalLayer border border-[#DEE2E6] dark:border-[#21262D] rounded-xl overflow-hidden">

          <div class="flex items-center justify-between px-3 py-2 border-b border-[#DEE2E6] dark:border-[#21262D] bg-[#FAF9F5] dark:bg-deepSpaceBlue/50">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full flex-shrink-0" :class="entry.error ? 'bg-red-400' : 'bg-sage'"></span>
              <code class="text-xs font-mono font-bold" :class="entry.error ? 'text-red-400' : 'text-saffron'" x-text="entry.tool"></code>
              <span class="text-xs text-mutedCharcoal dark:text-steelMist" x-text="'→ ' + entry.service"></span>
            </div>
            <span class="text-xs text-mutedCharcoal dark:text-steelMist" x-text="entry.duration_ms != null ? entry.duration_ms + 'ms' : ''"></span>
          </div>

          <div class="px-3 pt-2 pb-1">
            <div class="text-xs font-semibold text-mutedCharcoal dark:text-steelMist mb-1 flex items-center justify-between">
              <span>REQUEST</span>
              <button @click="copyText(JSON.stringify(entry.req, null, 2))" class="hover:text-saffron transition-colors">copy</button>
            </div>
            <pre class="text-xs font-mono bg-[#FAF9F5] dark:bg-deepSpaceBlue rounded-lg p-2 overflow-x-auto whitespace-pre-wrap break-all leading-relaxed" x-text="JSON.stringify(entry.req, null, 2)"></pre>
          </div>

          <div class="px-3 pb-2 pt-1">
            <div class="text-xs font-semibold mb-1 flex items-center justify-between"
                 :class="entry.error ? 'text-red-400' : 'text-mutedCharcoal dark:text-steelMist'">
              <span>RESPONSE</span>
              <button @click="copyText(JSON.stringify(entry.res, null, 2))" class="text-mutedCharcoal dark:text-steelMist hover:text-saffron transition-colors">copy</button>
            </div>
            <pre class="text-xs font-mono bg-[#FAF9F5] dark:bg-deepSpaceBlue rounded-lg p-2 overflow-x-auto whitespace-pre-wrap break-all leading-relaxed max-h-64" x-text="JSON.stringify(entry.res, null, 2)"></pre>
          </div>

          <template x-if="entry.res && entry.res.result">
            <div class="px-3 pb-3">
              <div class="text-xs font-semibold text-sage mb-1">RESULT</div>
              <div class="text-xs font-mono bg-sage/5 border border-sage/20 rounded-lg p-2 max-h-48 overflow-y-auto whitespace-pre-wrap break-all leading-relaxed" x-text="entry.res.result"></div>
            </div>
          </template>

        </div>
      </template>
    </div>

  </div>

</div>

<script>
function mcpTester() {
  return {
    services: [],
    loading_services: true,
    selected_service: null,
    selected_tool: null,
    param_fields: [],
    params: {},
    raw_params: '',
    timeout_s: '30',
    loading: false,
    history: [],

    async init() {
      try {
        const r = await fetch('/api/mcp-tester/services');
        const d = await r.json();
        this.services = d.services || [];
      } catch (e) {
        console.error('Failed to load services:', e);
      } finally {
        this.loading_services = false;
      }
    },

    selectService(svc) {
      this.selected_service = svc;
      this.selected_tool = null;
      this.param_fields = [];
      this.params = {};
      this.raw_params = '';
    },

    selectTool(toolName) {
      this.selected_tool = toolName;
      this.params = {};
      this.raw_params = '';

      if (toolName === '__ping__' || toolName === '__tools_list__') {
        this.param_fields = [];
        return;
      }

      const tool = this.selected_service.tools.find(t => t.name === toolName);
      if (!tool || !tool.params) { this.param_fields = []; return; }

      const props = tool.params.properties || {};
      const required = tool.params.required || [];

      this.param_fields = Object.entries(props).map(([name, schema]) => ({
        name,
        type: schema.type || 'string',
        description: schema.description || '',
        required: required.includes(name),
        enum: schema.enum || null,
        default: schema.default ?? null,
      }));

      for (const f of this.param_fields) {
        if (f.enum) this.params[f.name] = f.enum[0];
        else if (f.default !== null) this.params[f.name] = f.default;
      }
    },

    tool_description() {
      if (!this.selected_tool || !this.selected_service) return '';
      if (this.selected_tool === '__ping__') return 'Send a ping frame — service returns pong.';
      if (this.selected_tool === '__tools_list__') return "Send tools.list — service returns its live tool schema.";
      const tool = this.selected_service.tools.find(t => t.name === this.selected_tool);
      return tool ? tool.description : '';
    },

    syncRawFromForm() {
      this.raw_params = JSON.stringify(this.params, null, 2);
    },

    effectiveParams() {
      if (this.raw_params.trim()) {
        try { return JSON.parse(this.raw_params); } catch {}
      }
      return this.params;
    },

    async sendFrame() {
      if (!this.selected_service || !this.selected_tool || this.loading) return;
      this.loading = true;

      const svc = this.selected_service;
      let endpoint, body;

      if (this.selected_tool === '__ping__') {
        endpoint = '/api/mcp-tester/ping';
        body = { port: svc.port };
      } else if (this.selected_tool === '__tools_list__') {
        endpoint = '/api/mcp-tester/tools-list';
        body = { port: svc.port };
      } else {
        endpoint = '/api/mcp-tester/call';
        body = { port: svc.port, tool: this.selected_tool, params: this.effectiveParams(), timeout_s: parseFloat(this.timeout_s) };
      }

      try {
        const r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const text = await r.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { request_frame: null, response_frame: { error: `HTTP ${r.status}: ${text.slice(0, 200)}` }, duration_ms: null }; }
        const isError = data.response_frame && (data.response_frame.error || data.response_frame.type === 'error');
        this.history.unshift({ service: svc.name, tool: this.selected_tool, req: data.request_frame, res: data.response_frame, duration_ms: data.duration_ms ?? null, error: isError });
      } catch (e) {
        this.history.unshift({ service: svc.name, tool: this.selected_tool, req: null, res: { error: String(e) }, duration_ms: null, error: true });
      } finally {
        this.loading = false;
      }
    },

    copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {});
    },
  };
}
</script>
{% endblock %}
