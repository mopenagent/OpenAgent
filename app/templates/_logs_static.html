<div class="bg-white dark:bg-stone-800 border border-[#DEE2E6] dark:border-stone-700 rounded-xl overflow-hidden shadow-sm dark:shadow-none mb-6">
  <div class="px-4 py-3 border-b border-[#DEE2E6] dark:border-stone-700 flex items-center justify-between">
    <h2 class="text-sm font-semibold text-stone-900 dark:text-stone-100">System Logs</h2>
    <span class="text-xs text-stone-500 dark:text-stone-400">Latest 1000 lines</span>
  </div>
  <pre class="font-mono text-xs text-stone-600 dark:text-stone-300 whitespace-pre-wrap overflow-x-auto h-96 overflow-y-auto p-4 bg-stone-50 dark:bg-stone-900 m-0" id="logs-container">{% if logs %}{{ logs }}{% else %}No logs found.{% endif %}</pre>
</div>
<script>
  (function() {
    var container = document.getElementById('logs-container');
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
  })();
</script>
