{% extends "base.html" %}
{% block title %}Browser — OpenAgent{% endblock %}
{% block page_title %}Browser{% endblock %}

{% block content %}
<div x-data="browserApp()" x-init="init()" class="h-full flex flex-col gap-0 w-full">

  <!-- ── Tab strip ────────────────────────────────────────── -->
  <div class="flex-shrink-0 flex items-end gap-1 border-b border-[#DEE2E6] dark:border-[#21262D] overflow-x-auto pb-0 mb-3">
    <template x-for="tab in tabs" :key="tab.session_id">
      <button @click="activateTab(tab.session_id)"
              :class="activeTab === tab.session_id
                ? 'border-b-2 border-saffron text-saffron bg-white dark:bg-deepSpaceBlue'
                : 'text-mutedCharcoal dark:text-steelMist hover:text-stone-900 dark:hover:text-stone-100 hover:bg-pastelFog dark:hover:bg-charcoalLayer'"
              class="relative px-3 py-2 text-xs font-medium flex items-center gap-1.5 rounded-t-lg -mb-px
                     border border-b-0 border-[#DEE2E6] dark:border-[#21262D] transition-colors flex-shrink-0 max-w-[160px]">
        <span class="truncate" x-text="tab.label || tab.session_id"></span>
        <span @click.stop="closeTab(tab.session_id)"
              class="flex-shrink-0 w-3.5 h-3.5 flex items-center justify-center rounded hover:bg-red-100 dark:hover:bg-red-900/30 hover:text-red-500 transition-colors">
          <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </span>
      </button>
    </template>
    <template x-if="tabs.length === 0">
      <span class="text-xs text-mutedCharcoal dark:text-steelMist italic px-3 py-2">
        No open sessions — ask the agent to open a URL
      </span>
    </template>

    <!-- Refresh button aligned right -->
    <div class="ml-auto flex items-center gap-2 pb-1">
      <span x-show="activeTab" class="text-xs font-mono text-mutedCharcoal dark:text-steelMist truncate max-w-xs"
            x-text="currentTabData()?.current_url || ''"></span>
      <template x-if="busy">
        <svg class="w-3.5 h-3.5 animate-spin text-saffron flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </template>
      <button @click="refreshScreenshot()"
              :disabled="!activeTab || busy"
              title="Refresh screenshot"
              class="w-7 h-7 flex items-center justify-center rounded border border-[#DEE2E6] dark:border-[#21262D]
                     text-mutedCharcoal dark:text-steelMist hover:text-saffron transition-colors disabled:opacity-40 flex-shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Screenshot viewer ─────────────────────────────────── -->
  <div class="flex-1 overflow-auto min-h-0">
    <template x-if="!activeTab">
      <div class="h-full flex items-center justify-center text-mutedCharcoal dark:text-steelMist">
        <div class="text-center space-y-3">
          <svg class="w-14 h-14 mx-auto opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <p class="text-sm">Browser sessions appear here.</p>
          <p class="text-xs text-mutedCharcoal/60 dark:text-steelMist/60">Ask the agent to open a URL in the chat.</p>
        </div>
      </div>
    </template>

    <template x-if="activeTab">
      <div class="rounded-xl border border-[#DEE2E6] dark:border-[#21262D] bg-[#0a0a0a] overflow-hidden">
        <img :src="screenshotUrl()"
             @load="ssLoaded = true"
             @error="ssLoaded = false"
             alt="Browser screenshot"
             class="w-full block"
             :class="ssLoaded ? '' : 'hidden'"/>
        <template x-if="!ssLoaded">
          <div class="h-64 flex items-center justify-center text-stone-500 text-sm">
            No screenshot yet
          </div>
        </template>
      </div>
    </template>
  </div>

</div>

<script>
function browserApp() {
  return {
    tabs: [],
    activeTab: null,
    busy: false,
    ssLoaded: false,
    ssTs: Date.now(),

    async init() {
      await this.loadSessions();
      // Refresh screenshot every 5s while a session is active
      setInterval(() => {
        if (this.activeTab && !this.busy) this.ssTs = Date.now();
      }, 5000);
    },

    async loadSessions() {
      try {
        const r = await fetch('/api/browser/sessions');
        const d = await r.json();
        const existing = Object.fromEntries(this.tabs.map(t => [t.session_id, t]));
        this.tabs = d.sessions.map(s => ({
          ...s,
          label: existing[s.session_id]?.label || s.session_id.slice(0, 12),
          current_url: existing[s.session_id]?.current_url || '',
        }));
        if (this.activeTab && !this.tabs.find(t => t.session_id === this.activeTab)) {
          this.activeTab = this.tabs[0]?.session_id || null;
        }
        if (!this.activeTab && this.tabs.length > 0) {
          this.activeTab = this.tabs[0].session_id;
        }
      } catch (e) {
        console.error('loadSessions', e);
      }
    },

    activateTab(session_id) {
      this.activeTab = session_id;
      this.ssLoaded = false;
      this.ssTs = Date.now();
    },

    currentTabData() {
      return this.tabs.find(t => t.session_id === this.activeTab) || null;
    },

    screenshotUrl() {
      if (!this.activeTab) return '';
      return `/artifacts/browser/${this.activeTab}/latest.png?t=${this.ssTs}`;
    },

    async closeTab(session_id) {
      if (!session_id) return;
      this.busy = true;
      try {
        await fetch(`/api/browser/session/${session_id}`, { method: 'DELETE' });
      } finally {
        this.busy = false;
      }
      this.tabs = this.tabs.filter(t => t.session_id !== session_id);
      if (this.activeTab === session_id) {
        this.activeTab = this.tabs[0]?.session_id || null;
      }
    },

    async refreshScreenshot() {
      if (!this.activeTab) return;
      this.busy = true;
      try {
        await fetch('/api/browser/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tool: 'browser.screenshot', params: { session_id: this.activeTab } }),
        });
        this.ssTs = Date.now();
      } finally {
        this.busy = false;
      }
    },
  };
}
</script>
{% endblock %}
