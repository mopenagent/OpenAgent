# OpenAgent observability + web UI stack
#
# Services:
#   jaeger  — traces/logs/metrics UI (always-on, shared by all modes)
#   ui      — Python FastAPI admin dashboard (connects to host-side openagent)
#   debug   — full Rust stack in a container (services + openagent control plane)
#
# Typical usage:
#   docker compose up -d           # start jaeger + web UI (host runs openagent via ./run.sh)
#   docker compose up debug        # start jaeger + full Rust stack in container (debug mode)
#   docker compose logs -f debug   # tail debug container logs
#
# Host-side runtime (ui mode):
#   The Rust openagent runtime runs on the host via ./run.sh.
#   The web UI container connects to it at host.docker.internal:8080.
#
# Container runtime (debug mode):
#   Pre-built linux binaries from bin/ are mounted into the container.
#   Build them first: make all  (requires `cross` + Docker for linux targets)
#
# OTEL endpoints (from host):
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318   (HTTP, default in run.sh)
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317   (gRPC)

services:
  # ---------------------------------------------------------------------------
  # Jaeger — traces, logs, metrics UI
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: openagent-jaeger
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP HTTP receiver (used by openagent runtime and services)
      - "4318:4318"
      # OTLP gRPC receiver
      - "4317:4317"
      # Zipkin HTTP
      - "9411:9411"
      # Jaeger Thrift compact (legacy)
      - "6831:6831/udp"
      # Jaeger Thrift binary
      - "6832:6832/udp"
      # Jaeger Thrift over HTTP (legacy)
      - "14268:14268"
      # Jaeger admin/metrics
      - "14269:14269"
      # Jaeger gRPC (legacy)
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - openagent
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web UI — Python FastAPI + HTMX admin dashboard
  #
  # Connects to the Rust openagent runtime at host.docker.internal:8080.
  # Secrets injected via .env file (same file used by run.sh on the host).
  # ---------------------------------------------------------------------------
  ui:
    container_name: openagent-ui
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8000:8000"
    environment:
      OPENAGENT_API_URL: "http://host.docker.internal:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      # MCP tester connects directly to service TCP ports on the host
      OPENAGENT_SERVICES_HOST: "host.docker.internal"
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount project-root data/ so the UI reads the same SQLite DB as the Rust runtime
      - ./data:/app/data
      # Mount logs/ so the UI can display live log files written by the Rust binary
      - ./logs:/app/logs
      # Mount config/ so the UI can show the current openagent.yaml
      - ./config:/app/config:ro
      # Mount services/ so the dashboard can read service.json manifests (runtime/version)
      - ./services:/app/services:ro
    networks:
      - openagent
    restart: unless-stopped
    depends_on:
      - jaeger
    extra_hosts:
      # Allow the container to reach the host-side openagent runtime
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Debug — full Rust stack (services + openagent control plane) in a container
  #
  # Use this to run and debug services that can't be built natively on macOS,
  # such as TTS (espeak-ng dependency skipped by `make local` on darwin).
  #
  # Prerequisites:
  #   make all   # cross-compiles linux binaries into bin/ (needs `cross` + Docker)
  #
  # Usage:
  #   docker compose up debug              # full stack (jaeger + debug)
  #   docker compose up jaeger debug       # explicit
  #   docker compose logs -f debug         # tail logs
  #
  # openagent Axum API → http://localhost:8080
  # Service TCP ports  → localhost:9000-9005, 9010
  # ---------------------------------------------------------------------------
  debug:
    container_name: openagent-debug
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      # openagent Axum control-plane API
      - "8080:8080"
      # MCP-lite service TCP ports (exposed for direct debugging)
      - "9000:9000"   # memory
      - "9001:9001"   # browser
      - "9002:9002"   # sandbox
      - "9003:9003"   # stt
      - "9004:9004"   # tts
      - "9005:9005"   # validator
      - "9010:9010"   # whatsapp
    volumes:
      # Log files: JSONL OTEL traces + per-service .log files.
      # Written by the container, visible on the host in real time.
      # `docker compose logs -f debug` streams these to the terminal.
      # Claude reads ./logs/*.log directly from the host filesystem.
      - ./logs:/app/logs
      # Runtime storage: SQLite session DB, ONNX model cache, downloaded artifacts.
      # Persisted on the host so data survives container restarts.
      - ./data:/app/data
      #
      # Everything else (binaries, config, service.json manifests, skills) is
      # baked into the image by Dockerfile.debug. To update config or skills,
      # rebuild: docker compose build debug
    env_file:
      - path: .env
        required: false
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OPENAGENT_ROOT: "/app"
      OPENAGENT_LOGS_DIR: "/app/logs"
    networks:
      - openagent
    depends_on:
      - jaeger
    # Allow the container to reach host-side processes (e.g. MSB server for sandbox)
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  openagent:
    driver: bridge
