# OpenAgent observability + web UI stack
#
# Usage:
#   docker compose up -d           # start jaeger + web UI
#   docker compose up -d jaeger    # jaeger only
#   docker compose logs -f ui      # tail web UI logs
#
# The Rust openagent runtime runs on the host via ./run.sh (not in Docker).
# The web UI container connects to it at host.docker.internal:8080.
#
# OTEL endpoints (from host):
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318   (HTTP, default in run.sh)
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317   (gRPC)

services:
  # ---------------------------------------------------------------------------
  # Jaeger — traces, logs, metrics UI
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: openagent-jaeger
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP HTTP receiver (used by openagent runtime and services)
      - "4318:4318"
      # OTLP gRPC receiver
      - "4317:4317"
      # Zipkin HTTP
      - "9411:9411"
      # Jaeger Thrift compact (legacy)
      - "6831:6831/udp"
      # Jaeger Thrift binary
      - "6832:6832/udp"
      # Jaeger Thrift over HTTP (legacy)
      - "14268:14268"
      # Jaeger admin/metrics
      - "14269:14269"
      # Jaeger gRPC (legacy)
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - openagent
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web UI — Python FastAPI + HTMX admin dashboard
  #
  # Connects to the Rust openagent runtime at host.docker.internal:8080.
  # Secrets injected via .env file (same file used by run.sh on the host).
  # ---------------------------------------------------------------------------
  ui:
    container_name: openagent-ui
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8000:8000"
    environment:
      OPENAGENT_API_URL: "http://host.docker.internal:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      # MCP tester connects directly to service TCP ports on the host
      OPENAGENT_SERVICES_HOST: "host.docker.internal"
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount project-root data/ so the UI reads the same SQLite DB as the Rust runtime
      - ./data:/app/data
      # Mount logs/ so the UI can display live log files written by the Rust binary
      - ./logs:/app/logs
      # Mount config/ so the UI can show the current openagent.yaml
      - ./config:/app/config:ro
      # Mount services/ so the dashboard can read service.json manifests (runtime/version)
      - ./services:/app/services:ro
    networks:
      - openagent
    restart: unless-stopped
    depends_on:
      - jaeger
    extra_hosts:
      # Allow the container to reach the host-side openagent runtime
      - "host.docker.internal:host-gateway"

networks:
  openagent:
    driver: bridge
